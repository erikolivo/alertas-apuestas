name: Fase 4 - Cierre de resultados

on:
  schedule:
    # 04:30 UTC = 23:30 (11:30pm) en Colombia/Perú/Ecuador (UTC-5).
    - cron: "30 4 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  cerrar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt

      - name: Cerrar resultados finales del historial
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: python cerrar_resultados.py

      - name: Guardar cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/partidos_hoy.json data/historial_dias data/estadisticas.xlsx data/uso_api_football.json
          git diff --quiet --cached || git commit -m "Cerrar resultados finales del día"
          git push
