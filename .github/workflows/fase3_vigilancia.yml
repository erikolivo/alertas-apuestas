name: Fase 3 - Vigilancia inteligente

on:
  schedule:
    # Antes: disparaba cada 5 minutos, todo el día. Confirmamos que
    # GitHub Actions NO garantiza que un cron tan frecuente corra en el
    # intervalo pedido — de hecho corría más o menos 1 vez por hora en
    # vez de cada 5 min, dejando la mayoría de los partidos casi sin
    # vigilar.
    #
    # Luego: 4 bloques de ~5.5 horas cada uno, mal espaciados (3 saltos
    # de 5h y uno de 9h) — dejaban un hueco real de ~3h10min sin
    # NINGUNA vigilancia entre las 00:50am y las 04:00am hora local, y
    # justo así se detectó: un partido arrancó a las 04:00 local, en el
    # borde exacto de ese hueco, y no se vigiló a tiempo.
    #
    # Ahora: 5 bloques, espaciados EXACTAMENTE cada 5 horas. Como cada
    # bloque corre hasta 5h50min (350 min) y el siguiente arranca a las
    # 5h00min, hay 50 minutos de solape entre bloques consecutivos —
    # cobertura de las 24 horas sin ningún hueco.
    - cron: "0 0 * * *"
    - cron: "0 5 * * *"
    - cron: "0 10 * * *"
    - cron: "0 15 * * *"
    - cron: "0 20 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  vigilar:
    runs-on: ubuntu-latest
    timeout-minutes: 350   # un poco menos que el límite de 360 min (6h) de GitHub, para que cierre solo
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt

      - name: Vigilar en bucle por ~5.5 horas
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          FIN=$(( $(date +%s) + 330*60 ))

          while [ "$(date +%s)" -lt "$FIN" ]; do
            echo "=== Revisión $(date -u +%H:%M:%S) UTC ==="
            python monitor.py

            git add data/partidos_hoy.json data/uso_api_football.json
            if ! git diff --quiet --cached; then
              git commit -m "Actualizar vigilancia"
              for intento in 1 2 3 4 5; do
                if git push; then
                  break
                fi
                echo "Push rechazado, reintentando ($intento/5)..."
                sleep $(( (RANDOM % 8) + 3 ))
                git pull --rebase origin main
              done
            fi

            sleep 300
          done

          echo "Bloque de 5.5 horas terminado, el siguiente bloque arranca solo más tarde."
